<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gallery — Selasie Visual Studio</title>
<meta name="description" content="Selected photography galleries by Selasie Visual Studio, Accra, Ghana.">
<meta name="referrer" content="strict-origin-when-cross-origin">
<script>try{document.documentElement.dataset.theme=localStorage.getItem('svs-theme')||'dark'}catch(e){}</script>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://images-pw.pixieset.com blob: data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
<link rel="icon" href="images/logo-dark.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0d0b; --bg2:#151210; --panel:#1c1815;
    --ink:#f3ede2; --dim:#a99f91; --line:rgba(243,237,226,.09);
    --gold:#d2a35d;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Manrope',-apple-system,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  html[data-theme="light"]{
    --bg:#f7f3ec; --bg2:#f1ebdf; --panel:#ffffff;
    --ink:#2c2620; --dim:#857868; --line:rgba(44,38,32,.14);
    --gold:#a5793f;
  }
  .theme-btn{background:none;border:1px solid var(--line);color:var(--ink);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:.95rem;line-height:1;transition:border-color .3s,color .3s}
  .theme-btn:hover{border-color:var(--gold);color:var(--gold)}
  html[data-theme="light"] nav{background:rgba(247,243,236,.9)}
  html[data-theme="light"] #lb{background:rgba(247,243,236,.97)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:17px;line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,13,11,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;justify-content:space-between;align-items:center;padding:14px clamp(20px,4vw,48px);max-width:1400px;margin:0 auto}
  .nav-brand{display:flex;align-items:center;gap:12px;font-family:var(--serif);font-size:.95rem;letter-spacing:.24em}
  .nav-brand img{height:32px;width:auto}
  .back{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);font-weight:500;transition:color .3s}
  .back:hover{color:var(--gold)}

  header{position:relative;padding:150px clamp(20px,4vw,48px) 60px;max-width:1200px;margin:0 auto}
  .eyebrow{display:flex;align-items:center;gap:14px;font-size:.66rem;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;font-weight:500}
  .eyebrow::before{content:'';width:36px;height:1px;background:var(--gold)}
  h1{font-family:var(--serif);font-weight:400;font-size:clamp(2.2rem,6vw,4.4rem);line-height:1.05;max-width:16ch}
  .desc{margin-top:22px;max-width:600px;color:var(--dim)}
  .count{margin-top:18px;font-size:.66rem;letter-spacing:.3em;text-transform:uppercase;color:var(--dim)}

  .masonry{columns:3;column-gap:18px;padding:20px clamp(20px,4vw,48px) 40px;max-width:1400px;margin:0 auto}
  @media(max-width:980px){.masonry{columns:2}}
  @media(max-width:560px){.masonry{columns:1}}
  .m-item{break-inside:avoid;margin-bottom:18px;position:relative;overflow:hidden;cursor:zoom-in;background:var(--panel);
    opacity:0;transform:translateY(36px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
  .m-item.in{opacity:1;transform:none}
  .m-item img{width:100%;filter:brightness(.9);transition:transform 1.1s var(--ease),filter .5s}
  .m-item:hover img{transform:scale(1.045);filter:brightness(1.02)}

  .cta-band{border-top:1px solid var(--line);margin-top:40px;padding:80px clamp(20px,4vw,48px);text-align:center;background:var(--bg2)}
  .cta-band h2{font-family:var(--serif);font-weight:400;font-size:clamp(1.8rem,4vw,2.8rem)}
  .cta-band h2 em{font-style:italic;color:var(--gold)}
  .cta-band p{color:var(--dim);margin:14px auto 30px;max-width:460px}
  .btn{display:inline-block;padding:16px 40px;font-size:.7rem;letter-spacing:.24em;text-transform:uppercase;font-weight:600;border:1px solid var(--line);transition:all .35s;margin:0 6px 12px}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.gold{background:var(--gold);border-color:var(--gold);color:#171310}
  .btn.gold:hover{background:#e0b877;color:#171310}
  .client-note{font-size:.72rem;color:var(--dim);margin-top:10px}
  .client-note a{color:var(--gold);border-bottom:1px solid rgba(210,163,93,.35)}

  footer{padding:44px 20px;text-align:center;border-top:1px solid var(--line);color:var(--dim);font-size:.78rem}

  /* Lightbox */
  #lb{position:fixed;inset:0;z-index:300;background:rgba(15,13,11,.97);display:none;align-items:center;justify-content:center}
  #lb.open{display:flex}
  #lb img{max-width:92vw;max-height:86vh;object-fit:contain;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--line);color:var(--ink);width:52px;height:52px;font-size:1.2rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
  .lb-btn:hover{border-color:var(--gold);color:var(--gold)}
  #lbPrev{left:clamp(10px,3vw,40px)}
  #lbNext{right:clamp(10px,3vw,40px)}
  #lbX{position:absolute;top:20px;right:clamp(10px,3vw,40px);transform:none}
  #lbCount{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:.7rem;letter-spacing:.3em;color:var(--dim)}
  @media(max-width:640px){.lb-btn{width:42px;height:42px}}

  ::selection{background:var(--gold);color:#171310}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){
    *{transition-duration:.01ms!important}
    .m-item{opacity:1;transform:none}
  }
</style>
</head>
<body>

<nav><div class="nav-in">
  <a href="index.html" class="nav-brand"><img class="js-logo" src="images/logo-white.png" alt=""><span>SELASIE&nbsp;VISUAL&nbsp;STUDIO</span></a>
  <span style="display:flex;align-items:center;gap:18px"><button class="theme-btn" id="themeBtn" aria-label="Switch between light and dark mode">☀</button><a href="index.html#work" class="back">← Back to portfolio</a></span>
</div></nav>

<header>
  <p class="eyebrow" id="gCat">Gallery</p>
  <h1 id="gTitle">Loading…</h1>
  <p class="desc" id="gDesc"></p>
  <p class="count" id="gCount"></p>
</header>

<div class="masonry" id="grid"></div>

<section class="cta-band">
  <h2>Love what you <em>see?</em></h2>
  <p>Let's create something like this for you — tell us about your shoot and we'll reply fast.</p>
  <a class="btn gold" href="index.html#contact">Book a session</a>
  <a class="btn" href="index.html#work">More galleries</a>

</section>

<footer>© <span id="yr"></span> Selasie Visual Studio · Photography &amp; Videography · Accra, Ghana</footer>

<div id="lb" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lb-btn" id="lbX" aria-label="Close">✕</button>
  <button class="lb-btn" id="lbPrev" aria-label="Previous image">←</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-btn" id="lbNext" aria-label="Next image">→</button>
  <div id="lbCount"></div>
</div>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();
const themeBtn = document.getElementById('themeBtn');
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'light' ? '☾' : '☀';
  document.querySelectorAll('.js-logo').forEach(i => { i.src = t === 'light' ? 'images/logo-dark.png' : 'images/logo-white.png'; });
  try{ localStorage.setItem('svs-theme', t); }catch(e){}
}
applyTheme(document.documentElement.dataset.theme || 'dark');
themeBtn.addEventListener('click', () => applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light'));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const okUrl = u => /^(https:\/\/|images\/|photos\/|\/)/.test(String(u ?? ''));
let imgs = [], cur = 0;

async function load(){
  try{
    const r = await fetch('data/galleries.json', {cache:'no-store'});
    const d = await r.json();
    const slug = new URLSearchParams(location.search).get('g');
    const g = d.galleries.find(x => x.slug === slug) || d.galleries[0];
    if(!g) return;
    document.title = g.title + ' — Selasie Visual Studio';
    document.getElementById('gCat').textContent = g.category || 'Gallery';
    document.getElementById('gTitle').textContent = g.title;
    document.getElementById('gDesc').textContent = g.description || '';
    imgs = (g.images || []).filter(i => okUrl(i.src));
    document.getElementById('gCount').textContent = imgs.length + ' photographs';
    const grid = document.getElementById('grid');
    grid.innerHTML = imgs.map((im,i) => `
      <div class="m-item" data-i="${i}" role="button" tabindex="0" aria-label="Open image ${i+1}">
        <img src="${esc(im.src)}" alt="${esc(im.alt || '')}" loading="lazy">
      </div>`).join('');
    const io = new IntersectionObserver(es => es.forEach((e,idx) => {
      if(e.isIntersecting){ setTimeout(() => e.target.classList.add('in'), (idx%3)*100); io.unobserve(e.target); }
    }), {threshold:.08});
    grid.querySelectorAll('.m-item').forEach(el => {
      io.observe(el);
      el.addEventListener('click', () => open(+el.dataset.i));
      el.addEventListener('keydown', e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); open(+el.dataset.i); } });
    });
  }catch(e){
    document.getElementById('gTitle').textContent = 'Gallery unavailable';
    document.getElementById('gDesc').textContent = 'Please go back and try again.';
  }
}
load();

/* Lightbox */
const lb = document.getElementById('lb'), lbImg = document.getElementById('lbImg'), lbCount = document.getElementById('lbCount');
function open(i){ cur = i; show(); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function close(){ lb.classList.remove('open'); document.body.style.overflow = ''; }
function show(){
  const im = imgs[cur];
  lbImg.src = im.src; lbImg.alt = im.alt || '';
  lbCount.textContent = (cur+1) + ' / ' + imgs.length;
}
function step(d){ cur = (cur + d + imgs.length) % imgs.length; show(); }
document.getElementById('lbX').addEventListener('click', close);
document.getElementById('lbPrev').addEventListener('click', () => step(-1));
document.getElementById('lbNext').addEventListener('click', () => step(1));
lb.addEventListener('click', e => { if(e.target === lb) close(); });
addEventListener('keydown', e => {
  if(!lb.classList.contains('open')) return;
  if(e.key === 'Escape') close();
  if(e.key === 'ArrowLeft') step(-1);
  if(e.key === 'ArrowRight') step(1);
});
/* Touch swipe */
let tx = null;
lb.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
lb.addEventListener('touchend', e => {
  if(tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if(Math.abs(dx) > 50) step(dx < 0 ? 1 : -1);
  tx = null;
}, {passive:true});
</script>
</body>
</html>
