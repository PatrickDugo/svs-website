# Netlify build configuration for Selasie Visual Studio
[build]
  command = "node scripts/scan-photos.js"
  publish = "."

# Keep internal notes in docs/ out of the public site (returns 404 if anyone tries)
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

# Keep the local admin tool off the public site
[[redirects]]
  from = "/admin-studio.html"
  to = "/404.html"
  status = 404
  force = true
